[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ucns"
version = "0.8.0"
description = "Unit Circle Number System – recursive factorization theory and witness-matrix depth-2 solver"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.8"
# No runtime dependencies – pure Python standard library only
dependencies = []

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
where = ["."]
include = ["ucns_recursive*"]

[tool.setuptools.package-data]
ucns_recursive = ["py.typed"]
