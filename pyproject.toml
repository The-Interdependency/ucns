[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ucns"
version = "0.1.0"
description = "Unit Circle Number System – zero-dependency compact embeddings via epicycle decomposition on the Möbius disk"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.8"
# No runtime dependencies – pure Python standard library only
dependencies = []

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
where = ["."]
include = ["ucns*"]

[tool.setuptools.package-data]
ucns = ["py.typed"]
