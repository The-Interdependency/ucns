name: Archive current UCNS implementation

on:
  push:
    paths:
      - .github/workflows/archive-current-repository.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-current-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the complete repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move every tracked artifact into archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p archive

          while IFS= read -r -d '' path; do
            case "$path" in
              archive/*)
                continue
                ;;
            esac

            destination="archive/$path"
            mkdir -p "$(dirname "$destination")"
            git mv -- "$path" "$destination"
          done < <(git ls-files -z)

          cat > README.md <<'EOF'
          # UCNS — reset at zero

          This repository has been reset in public.

          The previous seven months of implementation, experiments, specifications,
          tests, and formal work are preserved without deletion under
          [`archive/`](archive/), with the complete Git history still intact.

          That work produced a normalized recursive factorization kernel, but the
          type called `UCNSObject` omitted a load-bearing invariant specified at the
          beginning of the project: **every UCNS object is a Möbius-twisted carrier,
          and zero exists only at its hidden twist/seam**.

          This is a foundational object-definition failure, not a cosmetic refactor.
          Continuing to patch the old type would preserve the error. The root of the
          repository therefore begins again from zero. Archived code may later be
          recovered only as an explicitly defined projection of complete UCNS; it is
          not to be represented as complete UCNS merely because it compiled, passed
          tests, or accumulated proofs.

          ## Canonical starting constraint

          - Every UCNS object is a recursive Möbius carrier.
          - Every object has exactly one intrinsic hidden twist/seam.
          - The seam is zero.
          - Zero is not an anchor, coordinate, ordinary glyph, face bit, empty list,
            first-angle normalization point, or multiplicative identity.
          - One circuit returns to the same visible position with reversed orientation.
          - Two circuits restore orientation and complete the return.
          - Normalization and admissible transformations cannot select, move, erase,
            or expose the seam.
          - Every recursive payload is itself a complete twist-bearing UCNS object.

          ## Current status

          There is no current implementation and no system-wide theorem claim at the
          repository root. The archive is evidence, history, and potentially reusable
          machinery—not the definition of UCNS.

          hmmm: the restart is public because the error and the work are public.
          EOF

          cat > CANON.md <<'EOF'
          # UCNS object canon — restart boundary

          ## Primitive invariant

          A UCNS object is a recursive Möbius carrier. Its unique intrinsic twist is
          the seam at which zero exists. Zero is hidden by topology: it is not one of
          the object's observable nonzero positions and is not chosen by coordinates.

          ## Immediate obligations

          A replacement object definition must make the following unrepresentable:

          1. a `UCNSObject` with no intrinsic twist;
          2. normalization that chooses an object's origin from its first anchor;
          3. identification of geometric zero with the multiplicative identity;
          4. face state stored without a lawful relation to seam-crossing parity;
          5. a recursive payload that is not itself twist-bearing;
          6. a transformation that moves or deletes the seam;
          7. a 360-degree traversal treated as complete return.

          No multiplication, factorization, embedding, codec, or theorem is promoted
          into the new root until it is defined over this object and preserves these
          obligations.
          EOF

          git add README.md CANON.md

      - name: Commit the public reset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "The Interdependency archive reset"
          git config user.email "wayseer@interdependentway.org"
          git commit -m "archive: preserve legacy implementation and restart from twist-bearing zero"
          git push origin HEAD:main
