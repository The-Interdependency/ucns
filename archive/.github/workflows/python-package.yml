name: python-package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install build/test tooling
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine "pytest>=8.3,<8.4"

    - name: Build package
      run: python -m build

    - name: Verify package metadata
      run: python -m twine check dist/*

    - name: Install package artifact
      run: |
        pip install dist/*.whl
        python - <<'PY'
        import builtins
        import importlib

        original_import = builtins.__import__

        def guarded_import(name, globals=None, locals=None, fromlist=(), level=0):
            if name == 'ucns_recursive' or name.startswith('ucns_recursive.'):
                raise AssertionError(f'ucns imported deprecated compatibility package {name!r}')
            return original_import(name, globals, locals, fromlist, level)

        builtins.__import__ = guarded_import
        ucns = importlib.import_module('ucns')
        assert hasattr(ucns, 'UCNSObject')
        assert hasattr(ucns, 'multiply')
        assert hasattr(ucns, 'factor_search_v08')
        print('ucns public import boundary ok')
        PY

    - name: Run full pytest suite
      run: python -m pytest ucns_recursive/tests tests -v
