name: evidence diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  evidence-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Capture targeted test output
        run: |
          set +e
          python -m pytest tests/test_evidence_envelope.py -vv --tb=short > evidence-test.log 2>&1
          echo "$?" > evidence-status.txt
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: evidence-diagnostic
          path: |
            evidence-test.log
            evidence-status.txt
