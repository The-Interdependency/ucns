name: repair remove-2pi target manifest

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/repair-remove-2pi-manifest.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: agent/remove-2pi-inscription-from-canon
          path: target
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate target living manifest
        working-directory: target
        run: python .agents/skills/manifest/generate.py --write

      - name: Commit exact generated manifest
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          if git diff --cached --quiet; then
            echo "target manifest already current"
            exit 0
          fi
          git commit -m "build(manifest): regenerate remove-2pi canon surface"
          git push origin HEAD:agent/remove-2pi-inscription-from-canon
