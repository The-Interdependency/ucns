name: carrier-lcm target (Lean)

# Targeted verifier for the Carrier-LCM proof frontier.
# This intentionally runs the exact pinned-toolchain command requested for
# PR acceptance; a green job means the file type-checks under formal/lean-toolchain,
# while remaining `sorry` leaves still retain their usual no-DEFENDED-status meaning.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'formal/**'
      - '.github/workflows/carrier-lcm-target.yml'

permissions:
  contents: read

jobs:
  carrier-lcm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan using formal/lean-toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat formal/lean-toolchain)"

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: formal/.lake
          key: carrier-lcm-lake-${{ hashFiles('formal/lean-toolchain', 'formal/lakefile.lean', 'formal/lake-manifest.json') }}

      - name: Hydrate Mathlib cache
        run: |
          source $HOME/.elan/env
          cd formal
          lake exe cache get

      - name: Build Ucns.CarrierLcm with pinned toolchain
        run: |
          source $HOME/.elan/env
          cd formal
          lake build Ucns.CarrierLcm

      - name: Reject executable admit/axiom in formal Lean files
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          def strip_lean_comments(text: str) -> str:
              out = []
              i = 0
              depth = 0
              while i < len(text):
                  if depth == 0 and text.startswith('--', i):
                      j = text.find('\n', i)
                      if j == -1:
                          break
                      out.append('\n')
                      i = j + 1
                  elif text.startswith('/-', i):
                      depth += 1
                      i += 2
                  elif depth > 0 and text.startswith('-/', i):
                      depth -= 1
                      i += 2
                  elif depth == 0:
                      out.append(text[i])
                      i += 1
                  else:
                      if text[i] == '\n':
                          out.append('\n')
                      i += 1
              return ''.join(out)

          failures = []
          for path in sorted(Path('formal/Ucns').glob('*.lean')):
              code = strip_lean_comments(path.read_text(encoding='utf-8'))
              for line_no, line in enumerate(code.splitlines(), 1):
                  if re.search(r'\b(admit|axiom)\b', line):
                      failures.append((path, line_no, line.strip()))

          for path, line_no, line in failures:
              print(f'{path}:{line_no}: executable admit/axiom token: {line}')
          if failures:
              sys.exit(1)
          PY

      - name: Reject executable CarrierLcm sorry regressions
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          def strip_lean_comments(text: str) -> str:
              out = []
              i = 0
              depth = 0
              while i < len(text):
                  if depth == 0 and text.startswith('--', i):
                      j = text.find('\n', i)
                      if j == -1:
                          break
                      out.append('\n')
                      i = j + 1
                  elif text.startswith('/-', i):
                      depth += 1
                      i += 2
                  elif depth > 0 and text.startswith('-/', i):
                      depth -= 1
                      i += 2
                  elif depth == 0:
                      out.append(text[i])
                      i += 1
                  else:
                      if text[i] == '\n':
                          out.append('\n')
                      i += 1
              return ''.join(out)

          path = Path('formal/Ucns/CarrierLcm.lean')
          code = strip_lean_comments(path.read_text(encoding='utf-8'))
          failures = [
              (line_no, line.strip())
              for line_no, line in enumerate(code.splitlines(), 1)
              if re.search(r'\bsorry\b', line)
          ]
          for line_no, line in failures:
              print(f'{path}:{line_no}: executable sorry token: {line}')
          if failures:
              sys.exit(1)
          PY

      - name: Report frontier sorry leaves without certifying them
        run: |
          echo 'Open executable sorry leaves outside CarrierLcm:'
          git grep -n -E '\bsorry\b' -- 'formal/Ucns/*.lean' ':!formal/Ucns/CarrierLcm.lean' || true
