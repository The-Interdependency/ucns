name: apply public-gonol formal scope out of band

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-public-gonol-formal-scope-out-of-band.yml"
      - ".github/public-gonol-formal-repair.trigger"

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out target canon branch
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: agent/promote-public-gonol-canon
          path: target
          fetch-depth: 0

      - name: Check out reviewed repair driver
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: ${{ github.event.pull_request.head.ref }}
          path: driver

      - name: Check out pinned canonical skill-lib outside target
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/skill-lib
          ref: 05ee7aa9b7d906664d976bf1f06ea44522110489
          path: skill-lib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Execute idempotent scope repair
        working-directory: target
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path("../driver/.github/workflows/apply-public-gonol-scope-v4.yml").read_text(encoding="utf-8")
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in workflow[start:end].splitlines()
          )
          exec(compile(script, "<public-gonol-scope-v4>", "exec"), {"__name__": "__main__"})
          PY

      - name: Regenerate clean metadata
        working-directory: target
        run: |
          rm -rf .tmp-skill-lib
          python .agents/skills/manifest/generate.py --write
          PYTHONPATH=../skill-lib python ../skill-lib/msdmd/collect.py \
            --root . \
            --repo The-Interdependency/ucns \
            --out ucns_msdmd.ts
          ! grep -q '\.tmp-skill-lib' ucns_msdmd.ts

      - name: Install target
        working-directory: target
        run: python -m pip install -e .[dev]

      - name: Run Python suite and capture status
        id: python_tests
        working-directory: target
        shell: bash
        run: |
          set +e
          python -m pytest -q 2>&1 | tee "$RUNNER_TEMP/public-gonol-python.log"
          status=${PIPESTATUS[0]}
          echo "$status" > "$RUNNER_TEMP/public-gonol-python.status"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run reconciliation and capture status
        id: audit
        working-directory: target
        shell: bash
        run: |
          set +e
          python audit/reconcile.py 2>&1 | tee "$RUNNER_TEMP/public-gonol-audit.log"
          status=${PIPESTATUS[0]}
          echo "$status" > "$RUNNER_TEMP/public-gonol-audit.status"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Lean and capture status
        id: lean
        working-directory: target/formal
        shell: bash
        run: |
          set +e
          lake exe cache get 2>&1 | tee "$RUNNER_TEMP/public-gonol-lean-cache.log"
          cache_status=${PIPESTATUS[0]}
          lake build 2>&1 | tee "$RUNNER_TEMP/public-gonol-lean.log"
          build_status=${PIPESTATUS[0]}
          status=$(( cache_status != 0 ? cache_status : build_status ))
          echo "$status" > "$RUNNER_TEMP/public-gonol-lean.status"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload exact validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: public-gonol-scope-validation
          path: |
            ${{ runner.temp }}/public-gonol-python.log
            ${{ runner.temp }}/public-gonol-python.status
            ${{ runner.temp }}/public-gonol-audit.log
            ${{ runner.temp }}/public-gonol-audit.status
            ${{ runner.temp }}/public-gonol-lean-cache.log
            ${{ runner.temp }}/public-gonol-lean.log
            ${{ runner.temp }}/public-gonol-lean.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce all gates
        env:
          PYTHON_STATUS: ${{ steps.python_tests.outputs.status }}
          AUDIT_STATUS: ${{ steps.audit.outputs.status }}
          LEAN_STATUS: ${{ steps.lean.outputs.status }}
        run: |
          echo "python=$PYTHON_STATUS audit=$AUDIT_STATUS lean=$LEAN_STATUS"
          test "$PYTHON_STATUS" = "0"
          test "$AUDIT_STATUS" = "0"
          test "$LEAN_STATUS" = "0"

      - name: Commit validated target changes
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md ucns_msdmd.ts \
            formal/Ucns/Core.lean formal/Ucns/CarrierLcm.lean formal/Ucns/TheoremN.lean \
            ucns/geometry_bridge.py ucns-theorem-n.md docs/carrier-support-pruning.md \
            docs/unitcircle-import-assessment.md audit/obligation_ledger.md
          git diff --cached --stat
          git commit -m "fix(canon): scope internal lemmas under the public twist origin"
          git push origin HEAD:agent/promote-public-gonol-canon
