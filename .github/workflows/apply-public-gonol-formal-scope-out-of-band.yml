name: public-gonol canon reconciliation source

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-only:
    runs-on: ubuntu-latest
    steps:
      - name: Canon reconciliation script source
        run: |
          python - <<'PY'
          from pathlib import Path

          def text(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, value: str) -> None:
              Path(path).write_text(value, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              value = text(path)
              count = value.count(old)
              if count == 1:
                  write(path, value.replace(old, new, 1))
                  print(f"corrected: {path}: {old[:72]!r}")
                  return
              if count == 0 and new in value:
                  print(f"already corrected: {path}: {new[:72]!r}")
                  return
              raise SystemExit(
                  f"{path}: expected one old fragment or the new fragment; old count={count}: {old[:120]!r}"
              )

          def insert_after(path: str, anchor: str, addition: str) -> None:
              value = text(path)
              if addition.strip() in value:
                  print(f"already inserted: {path}")
                  return
              if value.count(anchor) != 1:
                  raise SystemExit(f"{path}: insertion anchor drifted: {anchor!r}")
              write(path, value.replace(anchor, anchor + addition, 1))
              print(f"inserted: {path}")

          # ------------------------------------------------------------------
          # Formal model: scope the normalized recursive algebra beneath the
          # fixed public frame. Do not change its executable definitions here.
          # ------------------------------------------------------------------
          replace_once(
              "formal/Ucns/Core.lean",
              "  Ucns/Core.lean — faithful definitions for the UCNS recursive algebra.\n\n"
              "  SOURCE OF TRUTH FOR SEMANTICS: ../../ucns/canonical.py\n"
              "  and ../../ucns-spec.md. This file replaces the `Unit` placeholder\n"
              "  carrier of the original scaffold with the real recursive\n"
              "  (angle, face, payload) sequence object.",
              "  Ucns/Core.lean — faithful definitions for the normalized recursive\n"
              "  factorization-object algebra.\n\n"
              "  SOURCE OF TRUTH FOR THIS INTERNAL REPRESENTATION:\n"
              "  ../../ucns/canonical.py and the factorization sections of\n"
              "  ../../ucns-spec.md. The canonical public gonol is formalized\n"
              "  separately in Ucns/PublicGonol.lean. Its fixed SPACE/ZERO twist\n"
              "  origin is not an arbitrary first anchor and is not normalized here."
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "  1. Angles are `Rat` (Lean core rationals), taken mod 4 via `amod4`,\n"
              "     mirroring `Fraction` angles in `[0, 4)`.",
              "  1. Internal factorization angles are `Rat`, measured in half-turn\n"
              "     units and taken mod 4 via `amod4`. Thus 2 records one\n"
              "     360-degree orientation-changing circuit and 4 records the\n"
              "     720-degree complete return. No public vertex-angle map is implied."
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "  4. `nMin` is computed exactly as `_compute_n_min`: lcm of denominators\n"
              "     of nonzero circle-fractions `(a mod 2) / 2`.",
              "  4. `nMin` is computed exactly as `_compute_n_min`: lcm of denominators\n"
              "     of nonzero internal circle-fractions `(a mod 2) / 2`.\n"
              "  5. First-angle normalization is object-relative. It does not select,\n"
              "     move, or quotient the public-gonol twist origin."
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "--   summary: Faithful Lean 4 model of UCNSObject, carrier (nMin), depth, fuel-indexed normalize and multiply, and the statement surface for the Carrier-LCM Law and cancellativity counterexample/status.",
              "--   summary: Lean 4 model of normalized recursive factorization objects, internal projected nMin, depth, object-relative normalization and multiplication, explicitly distinct from the fixed-origin public gonol."
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "--   unresolved: AlignedComplete cancellativity as previously stated is refuted by a concrete mod-4 tail-angle counterexample; next true theorem needs canonical angle-range/floor-zero evidence. Carrier-LCM is discharged in Ucns/CarrierLcm.lean; remaining order — repair cancellativity domain, then depth1 completeness",
              "--   unresolved: bridge from the fixed-origin public gonol to this normalized factorization model remains hmmm; AlignedComplete cancellativity is refuted by a concrete mod-4 tail-angle counterexample; Carrier-LCM is discharged only for internal nMin; remaining order — specify the public bridge, repair cancellativity domain, then depth1 completeness"
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "/-- A UCNS object: a nonempty-in-practice list of cells whose payloads\n"
              "    are themselves UCNS objects. `n_dec` (declared carrier) is carried\n"
              "    separately, as in the Python implementation. -/",
              "/-- A normalized recursive factorization object: a nonempty-in-practice\n"
              "    list of cells whose payloads are objects of the same internal type.\n"
              "    This is not the public gonol. `n_dec` is carried separately. -/"
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "/-- Circle fraction `(a mod 2) / 2`, as in `_compute_n_min`. -/",
              "/-- Internal projected circle fraction `(a mod 2) / 2`, as in\n"
              "    `_compute_n_min`. It is not a complete public-gonol invariant. -/"
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "/-- The minimal carrier: lcm of nonzero circle-fraction denominators\n"
              "    (empty lcm = 1). Host-level only — payloads do not enter, exactly\n"
              "    as in `_compute_n_min`. -/",
              "/-- The internal projected carrier: lcm of nonzero circle-fraction\n"
              "    denominators (empty lcm = 1). Host-level only. No claim is made\n"
              "    that this is the complete twist-bearing public carrier. -/"
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "/-- Fuel-indexed normalization. Fuel 0 is the identity (out of budget);\n"
              "    fuel (d+1) shifts host angles by the first angle and normalizes\n"
              "    payloads with fuel d. For `x` with `depth x ≤ d`, `normalizeFuel d x`\n"
              "    is the intended total normalization. -/",
              "/-- Fuel-indexed object-relative normalization for internal factorization\n"
              "    objects. Fuel 0 is the out-of-budget identity; fuel (d+1) shifts\n"
              "    host angles by that object's first angle and normalizes payloads.\n"
              "    It is never applied to the fixed public-gonol origin. -/"
          )
          replace_once(
              "formal/Ucns/Core.lean",
              "/-- Fuel-indexed ordered-concatenation product `A ⊠ B`, mirroring\n"
              "    `multiply` in `canonical.py`: row-major cross product of cells,\n"
              "    angles `αₖ + (βⱼ - β₀)` mod 4, faces XOR, payloads multiplied\n"
              "    recursively (unit `none` is the payload identity). -/",
              "/-- Fuel-indexed ordered-concatenation product of internal normalized\n"
              "    factorization objects, mirroring `canonical.py`: row-major cells,\n"
              "    object-relative right-head baseline, mod-4 half-turn angles, face\n"
              "    XOR, and recursive payload multiplication. No public bridge is assumed. -/"
          )

          replace_once(
              "formal/Ucns/CarrierLcm.lean",
              "  Ucns/CarrierLcm.lean — discharge skeleton for the Carrier-LCM Law.",
              "  Ucns/CarrierLcm.lean — sorry-free LCM theorem for the internal\n"
              "  projected nMin of normalized factorization objects. It is not, without\n"
              "  a twist/origin-preserving bridge, the complete public-carrier theorem."
          )
          replace_once(
              "formal/Ucns/CarrierLcm.lean",
              "--   summary: Decomposition of the Carrier-LCM Law into machine-checked composition plus isolated leaf obligations, with the Nat.lcm fold engine fully discharged.",
              "--   summary: Sorry-free LCM law for internal projected nMin on Complete normalized factorization objects; no complete-public-gonol carrier claim."
          )
          replace_once(
              "formal/Ucns/CarrierLcm.lean",
              "--   unresolved: none in this module; imported frontier files still contain sorry-backed statements",
              "--   unresolved: bridge from the fixed twist-bearing public gonol to internal nMin remains hmmm; this file does not identify nMin with the complete public carrier"
          )
          replace_once(
              "formal/Ucns/CarrierLcm.lean",
              "/-- The Law, composed from the bounds by antisymmetry. The Carrier-LCM\n"
              "    decomposition in this module is machine-checked and sorry-free. -/",
              "/-- The internal nMin LCM law, composed from the bounds by antisymmetry.\n"
              "    It is machine-checked and sorry-free for this exact definition. -/"
          )
          replace_once(
              "formal/Ucns/CarrierLcm.lean",
              "/-- Public Carrier-LCM law on the repaired `Complete` domain.\n\n"
              "    This replaces the older host-normalized-only Core stub, whose statement was\n"
              "    too weak for empty-factor counterexamples. Fuel is written as `d + 1` to\n"
              "    expose the one-step product case used by `multiplyFuel`. -/",
              "/-- Exported internal projected-nMin LCM law on `Complete` normalized\n"
              "    factorization objects. Exported API does not mean public gonol. -/"
          )

          replace_once(
              "formal/Ucns/TheoremN.lean",
              "  Lean 4 model of the UCNS Theorem N family and of the finite search it\n"
              "  quantifies over.",
              "  Lean 4 model of the Theorem N family over the normalized recursive\n"
              "  factorization algebra and of the finite search it quantifies over.\n"
              "  It is not completeness for the fixed-origin public gonol."
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "  faithful object model of `Ucns/Core.lean`:",
              "  internal normalized factorization-object model of `Ucns/Core.lean`;\n"
              "  no public-gonol bridge is assumed:"
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "     products of normalized factors the recovered angles are already\n"
              "     gauge-fixed). Recorded in the obligation ledger.",
              "     products of normalized factors the recovered angles already satisfy\n"
              "     the object-relative baseline). This is not the fixed public origin.\n"
              "     Recorded in the obligation ledger."
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "--   summary: Defined (non-opaque) finite-search model for factor_search_v08 - catalogue normalization, split/host/payload/face enumeration, unit rejection, exact-recomposition success relation - plus the Theorem N statement family over it.",
              "--   summary: Defined finite-search model and Theorem N statement family over normalized recursive factorization objects; no public-gonol completeness or bridge claim."
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "--   unresolved: face-superset equivalence and no-renormalization boundary are undischarged obligations; the three completeness theorems remain sorry; not machine-checked in the authoring environment (no Lean toolchain) - CI formal.yml is the checking authority",
              "--   unresolved: public-gonol bridge, face-superset equivalence, and assembly normalization boundary are undischarged; all three completeness statements remain sorry and internal"
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "/-- The depth-agnostic product, at fuel sufficient for both operands. -/",
              "/-- The depth-agnostic internal factorization product. It neither defines\n"
              "    public-gonol composition nor proves preservation of the twist. -/"
          )
          replace_once(
              "formal/Ucns/TheoremN.lean",
              "    All three statements below remain closed by `sorry`: they are\n"
              "    UNVERIFIED HOLES awaiting proof and external formal review, and they\n"
              "    confer no DEFENDED status. What is no longer a hole is their\n"
              "    MEANING — the conclusion now unfolds to \"some enumerated candidate\n"
              "    pair survives unit rejection and exactly recomposes\". -/",
              "    All three statements below remain closed by `sorry`: they are\n"
              "    UNVERIFIED HOLES and confer no DEFENDED status. They quantify only\n"
              "    over normalized recursive factorization objects. Even after discharge,\n"
              "    no public-gonol completeness follows without a faithful bridge. -/"
          )

          # Runtime compatibility geometry is not the public frame.
          replace_once(
              "ucns/geometry_bridge.py",
              "Commutative audit projection from UCNS-A into UCNS-G coordinates.",
              "Commutative audit projection of normalized recursive factorization\n"
              "objects into compatibility geometry coordinates. This is not the\n"
              "public-gonol frame and does not recover or move its fixed twist origin."
          )
          replace_once(
              "ucns/geometry_bridge.py",
              "#   summary: commutative audit projection via recursive radius, breadth, spinor angle, and chirality coordinates",
              "#   summary: commutative compatibility projection of normalized factorization objects; explicitly not the fixed-origin public-gonol frame"
          )
          replace_once(
              "ucns/geometry_bridge.py",
              "#   unresolved: injectivity-proof-analytical, degenerate-theta-canonical-form, quaternionic-axis-lift",
              "#   unresolved: public-gonol bridge, twist/origin preservation, injectivity-proof-analytical, degenerate-theta-canonical-form, quaternionic-axis-lift"
          )
          replace_once(
              "ucns/geometry_bridge.py",
              '    "ThetaDegenerate",\n]',
              '    "ThetaDegenerate",\n    "NORMALIZED_FACTORIZATION_PROJECTION",\n    "PUBLIC_GONOL_BRIDGE_STATUS",\n]'
          )
          replace_once(
              "ucns/geometry_bridge.py",
              "_TAU4 = 4.0 * math.pi\n_TOL = 1e-9",
              "_TAU4 = 4.0 * math.pi\n_TOL = 1e-9\n\nNORMALIZED_FACTORIZATION_PROJECTION = True\nPUBLIC_GONOL_BRIDGE_STATUS = \"hmmm\""
          )
          replace_once(
              "ucns/geometry_bridge.py",
              "    \"\"\"Commutative audit coordinates ``(rho, lambda, theta, z, w)``.\n\n"
              "    ``r`` is retained as the backward-compatible field name for breadth\n"
              "    ``lambda = log(len(A_plus))``. Use ``breadth`` in new prose and code.\n"
              "    \"\"\"",
              "    \"\"\"Compatibility coordinates for normalized factorization objects.\n\n"
              "    ``r`` remains the compatibility field for breadth. These coordinates\n"
              "    do not identify or replace the public-gonol origin.\n"
              "    \"\"\""
          )
          replace_once(
              "ucns/geometry_bridge.py",
              '    \"\"\"Circular mean angle on R/4piZ. None when degenerate.\"\"\"',
              '    \"\"\"Internal circular mean on R/4piZ; not a public-origin coordinate.\"\"\"'
          )
          replace_once(
              "ucns/geometry_bridge.py",
              '    \"\"\"Map a UCNSObject to its commutative audit projection.\"\"\"',
              '    \"\"\"Project a normalized factorization object; no public bridge.\"\"\"'
          )
          replace_once(
              "ucns/geometry_bridge.py",
              '    \"\"\"Check projection(a box b) == compose(projection(a), projection(b)).\"\"\"',
              '    \"\"\"Check the internal compatibility-projection homomorphism only.\"\"\"'
          )
          replace_once(
              "ucns/geometry_bridge.py",
              '    \"\"\"Check projection injectivity over a supplied finite collection.\"\"\"',
              '    \"\"\"Check internal projection injectivity on a supplied finite set.\"\"\"'
          )

          # ------------------------------------------------------------------
          # Prose and release surfaces: the public gonol is the foundation;
          # recursive factorization is an internal model, not the whole system.
          # ------------------------------------------------------------------
          theorem = text("ucns-theorem-n.md")
          boundary = (
              "\n**Public-gonol boundary:** every object, multiplication, catalogue, and\n"
              "completeness statement below belongs to the normalized recursive\n"
              "factorization model. The fixed SPACE/ZERO twist origin and 720-degree\n"
              "complete return are not represented by an inferred angle or first-anchor\n"
              "gauge. Theorem N is not completeness for the full public gonol without a\n"
              "separately specified and proved faithful bridge.\n"
          )
          if boundary.strip() not in theorem:
              theorem = theorem.replace("**Authors:**", boundary + "\n**Authors:**", 1)
          theorem = theorem.replace(
              "**Key finding:** `factor_search_v08` is depth-agnostic. One catalogue-sufficient statement covers all depths as a proof target;",
              "**Key finding within the normalized factorization model:** `factor_search_v08` is depth-agnostic. One catalogue-sufficient statement covers all recursive payload depths in that model as a proof target;",
              1,
          )
          theorem = theorem.replace(
              "Let `A`, `B` be UCNS objects",
              "Let `A`, `B` be normalized recursive factorization objects",
              1,
          )
          theorem = theorem.replace(
              "returns the angle sequences of `A` and `B` exactly (both normalized to start at 0).",
              "returns their internal angle sequences exactly (both object-relative normalized to start at 0; that zero is not the public twist origin).",
              1,
          )
          theorem = theorem.replace(
              "Catalogue-sufficient completeness at all depths (Theorem N)",
              "Catalogue-sufficient completeness at all recursive depths of the normalized factorization model (Theorem N)",
              1,
          )
          bridge_hmmm = (
              "\n- **Public-gonol bridge.** The fixed twist origin and 720-degree return are\n"
              "  not bridged into the normalized search model. No system-wide\n"
              "  completeness status transfers across that missing theorem.\n"
          )
          if bridge_hmmm.strip() not in theorem:
              theorem = theorem.replace("## 8. hmmm preserved\n", "## 8. hmmm preserved\n" + bridge_hmmm, 1)
          write("ucns-theorem-n.md", theorem)

          carrier = text("docs/carrier-support-pruning.md")
          carrier = carrier.replace(
              "**Scope:** the canonical recursive engine in this repository\n(`ucns.canonical`): normalized `UCNSObject`s under `multiply`.",
              "**Scope:** the normalized recursive factorization engine\n(`ucns.canonical`) under `multiply`. This theorem concerns internal `n_min`; it\nis not the complete-carrier theorem for the fixed-origin public gonol.",
              1,
          )
          carrier = carrier.replace(
              "This document proves the underlying carrier identity *exactly*\n(equality, not merely divisibility) on the canonical substrate,",
              "This document proves the internal projected-`n_min` identity *exactly*\n(equality, not merely divisibility) on the normalized factorization substrate,",
              1,
          )
          carrier = carrier.replace(
              "> **Law.** For normalized UCNS objects `A`, `B` with `P = multiply(A, B)`:",
              "> **Internal nMin law.** For normalized factorization objects `A`, `B`\n> with `P = multiply(A, B)`:",
              1,
          )
          carrier = carrier.replace(
              "2. The Law is a host-level statement: payload nesting does not enter\n   `_compute_n_min`, so the Law holds at every depth uniformly.",
              "2. The law is host-level: payload nesting does not enter `_compute_n_min`,\n   so it holds at every recursive depth of the internal model. It does not prove\n   that `n_min` contains twist, orientation, faces, or the 720-degree return.",
              1,
          )
          carrier_hmmm = (
              "- A faithful bridge from the fixed-origin public gonol to internal `n_min`\n"
              "  is absent. Carrier-LCM must not be cited as a complete public-carrier\n"
              "  theorem until that bridge preserves twist, orientation, faces, and the\n"
              "  720-degree return.\n"
          )
          if carrier_hmmm.strip() not in carrier:
              carrier = carrier.replace("## hmmm\n", "## hmmm\n\n" + carrier_hmmm, 1)
          write("docs/carrier-support-pruning.md", carrier)

          assessment = text("docs/unitcircle-import-assessment.md")
          correction = (
              "\n## Public-gonol canon correction — 2026-07-16\n\n"
              "The exact public gonol from `a0-betatest@7af8deb` is now a UCNS runtime\n"
              "primitive. This does not promote the separate UnitCircle experiment\n"
              "repository wholesale. Any gonal/Möbius visualization must consume UCNS\n"
              "and may not redefine the twist origin or 720-degree return.\n"
          )
          if correction.strip() not in assessment:
              assessment = assessment.replace("## Import decision", correction + "\n## Import decision", 1)
          assessment = assessment.replace(
              "- gonal-Möbius state construction from `scripts/build_gonal_mobius_embedding.py`;",
              "- visualization adapters from `scripts/build_gonal_mobius_embedding.py`, only after they consume the UCNS public gonol rather than define a second carrier;",
              1,
          )
          write("docs/unitcircle-import-assessment.md", assessment)

          pure = text("docs/pure-ucns-number-system.md")
          pure = pure.replace(
              "UCNS number := canonical recursive unit-circle traversal object\noperation   := recursive product, written ⊠\nidentity    := unit object / unit-equivalent traversal",
              "UCNS public frame := canonical 157-position twist-bearing gonol\npublic origin     := SPACE/ZERO at fixed position 0\ncomplete return   := 720 degrees; 360 degrees flips orientation\nfactorization number := normalized recursive object within that frame\ninternal operation    := recursive product, written ⊠\ninternal identity     := factorization-unit object, not public SPACE/ZERO",
              1,
          )
          pure = pure.replace(
              "This document defines UCNS as a number system before it is used as cognition, embedding, retrieval, or agent substrate.",
              "This document defines UCNS from its canonical public gonol before describing the normalized recursive factorization layer used by cognition, embedding, retrieval, or agent substrates.",
              1,
          )
          pure = pure.replace(
              "A UCNS number is a recursively composable traversal object over the unit circle.",
              "The irreducible UCNS foundation is the public gonol: a 157-position carrier whose fixed position 0 is SPACE/ZERO, the Möbius twist, seam, and system origin. One 360-degree circuit changes orientation; complete return requires 720 degrees.\n\nA normalized recursive factorization number is a separate internal object represented by `UCNSObject` within that system. It must not be mistaken for the public frame.",
              1,
          )
          pure = pure.replace(
              "The minimal carrier is intrinsic. It is the smallest carrier required by the anchor set.",
              "For normalized factorization objects, the internal `n_min` carrier is the smallest denominator carrier required by the anchor set. It is not yet proved to be the complete twist-bearing public carrier.",
              1,
          )
          pure = pure.replace(
              "A0 must only consume canonical UCNS objects.",
              "A0 must consume the canonical public gonol from UCNS and may consume normalized factorization objects only through explicitly scoped interfaces.",
              1,
          )
          pure = pure.replace(
              "A UCNS number is a canonical recursive unit-circle traversal object whose anchors, face states, carriers, and payloads are preserved under a declared equality policy, and whose arithmetic is recursive composition under ⊠.",
              "UCNS is rooted in the canonical public gonol: the fixed SPACE/ZERO Möbius-twist origin on the 157-position carrier with 720-degree complete return. `UCNSObject` is the normalized recursive factorization-number representation currently implemented within that frame. Their faithful bridge remains hmmm and is not supplied by first-anchor normalization.",
              1,
          )
          write("docs/pure-ucns-number-system.md", pure)

          shape = text("docs/ucns-shape-reconciliation.md")
          shape_intro = (
              "\n## Canonical public-frame correction — 2026-07-16\n\n"
              "The earlier two-way inventory was incomplete. UCNS has a foundational\n"
              "public gonol, canonically promoted from `a0-betatest@7af8deb`: position 0\n"
