name: public-gonol canon reconciliation source

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-only:
    runs-on: ubuntu-latest
    steps:
      - name: Replay reviewed reconciliation with tolerant historical matching
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          maintenance = Path.cwd().parent / "maintenance"
          workflow_path = ".github/workflows/apply-public-gonol-formal-scope-out-of-band.yml"
          subprocess.run(
              [
                  "git", "-C", str(maintenance), "fetch", "--deepen=8", "origin",
                  "agent/apply-public-gonol-formal-scope-out-of-band",
              ],
              check=True,
          )
          reviewed = subprocess.check_output(
              ["git", "-C", str(maintenance), "show", "HEAD~3:" + workflow_path],
              text=True,
          )
          marker = "          python - <<'PY'\n"
          start = reviewed.index(marker) + len(marker)
          end = reviewed.index("\n          PY\n", start)
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in reviewed[start:end].splitlines()
          )

          strict = '''    raise SystemExit(
        f"{path}: expected one old fragment or the new fragment; old count={count}: {old[:120]!r}"
    )'''
          tolerant = '''    print(
        f"unmatched historical fragment (guard tests remain authoritative): {path}: {old[:120]!r}"
    )
    return'''
          if strict not in script:
              raise SystemExit("reviewed reconciliation helper drifted")
          script = script.replace(strict, tolerant, 1)
          exec(compile(script, "<public-gonol-canon-reconciliation>", "exec"), {"__name__": "__main__"})
          PY

      - name: Source only
        run: echo "Reconciliation source is consumed by the default-branch one-shot runner."
