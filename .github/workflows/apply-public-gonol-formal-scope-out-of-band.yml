              "360-degree circuit flips orientation and complete return requires 720\n"
              "degrees. The recursive `UCNSObject` below is the normalized factorization\n"
              "model inside UCNS, not the public frame itself. UCNS-G remains the metric\n"
              "geometry. No bridge among all three is inferred.\n"
          )
          if shape_intro.strip() not in shape:
              shape = shape.replace("## Scope and method", shape_intro + "\n## Scope and method", 1)
          shape = shape.replace(
              "UCNS-A is implemented as `UCNSObject(n_dec, n_min, A_plus, F_plus)`",
              "The normalized UCNS factorization model is implemented as `UCNSObject(n_dec, n_min, A_plus, F_plus)`",
              1,
          )
          shape = shape.replace(
              "The first decisive divergence is object ontology:",
              "The first decisive divergence is now a three-surface ontology:",
              1,
          )
          shape = shape.replace(
              "- UCNS-A canonical object is a **recursive ordered sequence of anchors with payload trees and face bits**.\n- UCNS-G is defined as a **single-point coordinate triple `(r, θ, z)`** with external metrics (DRIFT, DVG).",
              "- The UCNS public gonol is the **fixed twist-bearing 157-position frame**.\n- The normalized factorization object is a **recursive ordered sequence of anchors with payload trees and face bits**.\n- UCNS-G is a **metric-disk/tensor geometry** with external measurement semantics.",
              1,
          )
          shape = shape.replace(
              "UCNS-A and UCNS-G currently appear to be distinct constructions sharing the name “UCNS,”",
              "The public gonol, normalized factorization model, and UCNS-G currently remain distinct typed surfaces under the UCNS name,",
              1,
          )
          shape = shape.replace(
              "- UCNS-A is a recursive algebra with multiplication/factorization semantics and theorem-scoped completeness conditions.",
              "- The public gonol supplies the fixed origin, twist, orientation, and 720-degree return.\n- The normalized recursive factorization model supplies multiplication/factorization semantics and internally scoped completeness conditions.",
              1,
          )
          write("docs/ucns-shape-reconciliation.md", shape)

          checklist = text("docs/edcm-edcmbone-bridge-checklist.md")
          checklist = checklist.replace(
              "The `ucns` repo's theorem frontier is fenced. UCNS-A is the recursive\nfactorization algebra defined and implemented in this repo.",
              "The `ucns` repo's theorem frontier is fenced. UCNS is rooted in the fixed-origin public gonol. The recursive factorization algebra is an internal typed surface with no assumed public-gonol bridge.",
              1,
          )
          checklist = checklist.replace(
              "| Catalogue-sufficient completeness (Theorem N) | `DEFENDED` — proof drafted, awaiting external formal review |",
              "| Catalogue-sufficient completeness in the normalized factorization model (Theorem N) | `FRONTIER` — formal statements remain `sorry`-backed and no public-gonol bridge exists |",
              1,
          )
          checklist = checklist.replace(
              "Core implemented surface:",
              "Public foundation and internal implemented surface:\n\n- canonical public gonol: fixed SPACE/ZERO twist origin, 157 positions, faces/chirality, lifted traversal, and 720-degree complete return;\n- no proved bridge from that public frame into the normalized factorization object.\n\nNormalized factorization surface:",
              1,
          )
          checklist = checklist.replace(
              "- the **information loss** at each step (twist collapse, phase rounding,\n  gauge ambiguity, sign quantization),",
              "- the **information loss** at each step (public twist/origin loss, 720-degree orientation loss, phase rounding, object-relative normalization, sign quantization),",
              1,
          )
          write("docs/edcm-edcmbone-bridge-checklist.md", checklist)

          supplement = text("docs/ucns-g-prime-cylinder-supplement.md")
