name: carrier-floor-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pinned skill-lib authority
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/skill-lib
          ref: fa6e6200bc274657de2334754bbbf98844ef6541
          path: .skill-lib-canon
          sparse-checkout: |
            msdmd
            meta-module-build
            test-build
            canon
            domain-claims
            interdependent-work-graph
            doctrine
            tools/check_consumer_drift.py
          sparse-checkout-cone-mode: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install verification dependencies
        run: python -m pip install --upgrade pip pytest build twine
      - name: Install package
        run: python -m pip install -e .
      - name: Check vendored skill-lib drift
        run: >-
          python .skill-lib-canon/tools/check_consumer_drift.py .
          --canon-root .skill-lib-canon
          --sha fa6e6200bc274657de2334754bbbf98844ef6541
          --strict-sha
          --require-vendored
      - name: Audit skill-lib contract graph
        run: python tools/verify_skill_lib_contracts.py .
      - name: Run tests
        run: python -m pytest
      - name: Build package
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
