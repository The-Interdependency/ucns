name: carrier-floor-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install verification dependencies
        run: python -m pip install --upgrade pip pytest build twine
      - name: Install package
        run: python -m pip install -e .
      - name: Audit skill-lib contract graph
        run: python tools/verify_skill_lib_contracts.py .
      - name: Run tests
        run: python -m pytest
      - name: Build package
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
