name: CI

on:
  push:
    paths:
      - 'ucns/**'
      - 'ucns_recursive/**'
      - 'ucns_cache/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'ucns/**'
      - 'ucns_recursive/**'
      - 'ucns_cache/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package (with dev extras)
        run: python -m pip install -e .[dev]

      - name: Run full pytest suite
        run: python -m pytest ucns_recursive/tests tests -v
