name: apply public-gonol scope repair v4

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-public-gonol-scope-v4.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Apply idempotent canon-scope rewrite
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, value: str) -> None:
              Path(path).write_text(value, encoding="utf-8")

          def prepend_once(path: str, marker: str, block: str) -> None:
              value = read(path)
              if marker not in value:
                  write(path, block + "\n" + value)

          def replace_all(path: str, replacements: tuple[tuple[str, str], ...]) -> None:
              value = read(path)
              for old, new in replacements:
                  value = value.replace(old, new)
              write(path, value)

          prepend_once(
              "formal/Ucns/Core.lean",
              "PUBLIC-GONOL SCOPE BOUNDARY",
              "/- PUBLIC-GONOL SCOPE BOUNDARY\n"
              "   This file defines the normalized recursive factorization-object algebra.\n"
              "   Its first-cell normalization is object-relative and does not select,\n"
              "   move, or quotient the public-gonol twist origin. The fixed public frame\n"
              "   is defined separately in Ucns/PublicGonol.lean.\n-/",
          )
          replace_all(
              "formal/Ucns/Core.lean",
              (
                  ("faithful definitions for the UCNS recursive algebra", "normalized recursive factorization-object algebra"),
                  ("Faithful Lean 4 model of UCNSObject", "Lean model of normalized recursive factorization UCNSObject values"),
                  ("A UCNS object: a nonempty-in-practice", "A normalized recursive factorization object: a nonempty-in-practice"),
                  ("Circle fraction `(a mod 2) / 2`", "Internal projected circle fraction `(a mod 2) / 2`"),
                  ("The minimal carrier: lcm of nonzero circle-fraction denominators", "The internal projected carrier: lcm of nonzero circle-fraction denominators"),
              ),
          )

          prepend_once(
              "formal/Ucns/CarrierLcm.lean",
              "PUBLIC-GONOL CARRIER BOUNDARY",
              "/- PUBLIC-GONOL CARRIER BOUNDARY\n"
              "   This sorry-free theorem concerns internal projected nMin on normalized\n"
              "   factorization objects. It is not the complete public-carrier theorem.\n"
              "   A twist/origin/720-return preserving bridge remains hmmm.\n-/",
          )
          replace_all(
              "formal/Ucns/CarrierLcm.lean",
              (
                  ("Public Carrier-LCM law on the repaired `Complete` domain", "Exported internal projected-nMin LCM law on the `Complete` normalized-factorization domain"),
                  ("Carrier-LCM Law", "internal projected-nMin LCM law"),
              ),
          )

          prepend_once(
              "formal/Ucns/TheoremN.lean",
              "PUBLIC-GONOL COMPLETENESS BOUNDARY",
              "/- PUBLIC-GONOL COMPLETENESS BOUNDARY\n"
              "   This file models finite search over normalized recursive factorization\n"
              "   objects. It is not completeness for the fixed-origin public gonol, and\n"
              "   no public-gonol bridge is assumed. The completeness statements remain\n"
              "   sorry-backed and FRONTIER.\n-/",
          )
          replace_all(
              "formal/Ucns/TheoremN.lean",
              (
                  ("Lean 4 model of the UCNS Theorem N family", "Lean model of the normalized-factorization Theorem N family"),
                  ("The depth-agnostic product, at fuel sufficient for both operands", "The depth-agnostic internal factorization product, at fuel sufficient for both operands"),
              ),
          )

          path = "ucns/geometry_bridge.py"
          value = read(path)
          value = value.replace(
              "Commutative audit projection from UCNS-A into UCNS-G coordinates.",
              "Commutative compatibility projection of normalized factorization objects. "
              "This is not the public-gonol frame and does not recover the fixed twist origin.",
          )
          if 'PUBLIC_GONOL_BRIDGE_STATUS = "hmmm"' not in value:
              value = value.replace(
                  "_TAU4 = 4.0 * math.pi\n_TOL = 1e-9",
                  "_TAU4 = 4.0 * math.pi\n_TOL = 1e-9\n\n"
                  "NORMALIZED_FACTORIZATION_PROJECTION = True\n"
                  "PUBLIC_GONOL_BRIDGE_STATUS = \"hmmm\"",
              )
              value = value.replace(
                  '    "ThetaDegenerate",\n]',
                  '    "ThetaDegenerate",\n    "NORMALIZED_FACTORIZATION_PROJECTION",\n    "PUBLIC_GONOL_BRIDGE_STATUS",\n]',
              )
          write(path, value)

          path = "ucns-spec.md"
          value = read(path)
          value = value.replace(
              "- **DEFENDED — proof drafted, awaiting external formal review.** Theorem N (catalogue-sufficient factorization at all depths). See `ucns-theorem-n.md`. The only hypothesis is that the catalogue contains every recursive payload of the true factors; no depth condition is imposed on the algorithm.",
              "- **FRONTIER.** Theorem N (catalogue-sufficient factorization over the normalized recursive factorization model). Its Lean completeness statements remain `sorry`-backed and it has no public-gonol scope without a proved bridge. See `ucns-theorem-n.md`.",
          )
          value = value.replace(
              "- **IMPLEMENTED + TEST-BACKED, not yet DEFENDED in the formal spec.** Full frozen depth-2 domain via `factor_search_v08`; depth-3 asymmetric (Theorem 9 instance of Theorem N, 6/6 empirical in `code/sweeps/t9_minimal_cat.py`).",
              "- **IMPLEMENTED + TEST-BACKED in declared internal domains, not system-wide proof.** Full frozen depth-2 behavior and selected asymmetric depth-3 fixtures use `factor_search_v08`; numerical execution claims require immutable run artifacts.",
          )
          if "**Foundational public-frame boundary.**" not in value:
              value = value.replace(
                  "**Public API.** The v1.0 public Python API is the `ucns` package (and `ucns.a0_safe` for A0-safe inspection). The legacy `ucns_recursive` package remains importable as a compatibility surface but is deprecated for direct user imports.\n",
                  "**Public API.** The v1.0 public Python API is the `ucns` package (and `ucns.a0_safe` for A0-safe inspection). The legacy `ucns_recursive` package remains importable as a compatibility surface but is deprecated for direct user imports.\n\n"
                  "**Foundational public-frame boundary.** The canonical primitive is the exact 157-position public gonol with fixed SPACE/ZERO Möbius-twist origin and 720-degree complete return. The flat, recursive, and factor-search sections below specify normalized factorization subsystems. No first-anchor normalization, internal value, unit object, or carrier projection is the public origin. The bridge remains `hmmm`.\n",
              )
          value = value.replace(
              "UCNS is a geometric-arithmetic system in which the primitive object is a paired traversal object rather than a scalar or symbol.\n\nA valid flat UCNS object is",
              "UCNS is rooted in the canonical public gonol. The flat kernel below is an internal paired factorization layer rather than the definition of the system origin.\n\nA valid flat factorization object is",
          )
          write(path, value)

          path = "docs/carrier-support-pruning.md"
          value = read(path)
          if "PUBLIC-GONOL CARRIER SCOPE" not in value:
              value = (
                  "<!-- PUBLIC-GONOL CARRIER SCOPE -->\n"
                  "> This document proves an internal projected-`n_min` identity for\n"
                  "> normalized factorization objects. It is not the complete carrier\n"
                  "> theorem for the fixed-origin public gonol. A faithful bridge must\n"
                  "> preserve twist, orientation, faces, chirality, and the 720-degree\n"
                  "> return before system-wide scope is claimed.\n\n"
                  + value
              )
          write(path, value)

          path = "ucns-theorem-n.md"
          value = read(path)
          if "PUBLIC-GONOL THEOREM SCOPE" not in value:
              value = (
                  "<!-- PUBLIC-GONOL THEOREM SCOPE -->\n"
                  "> Theorem N is stated over normalized recursive factorization objects.\n"
                  "> It is not a theorem about the complete public gonol without a\n"
                  "> separately specified and proved origin/twist-preserving bridge.\n\n"
                  + value
              )
          write(path, value)

          path = "docs/unitcircle-import-assessment.md"
          value = read(path)
          if "Public-gonol canon correction — 2026-07-16" not in value:
              value += (
                  "\n\n## Public-gonol canon correction — 2026-07-16\n\n"
                  "The exact public gonol from `a0-betatest@7af8deb` is UCNS canon.\n"
                  "Any UnitCircle visualization must consume it and may not redefine\n"
                  "its fixed twist origin or 720-degree complete return.\n"
              )
          write(path, value)

          path = "audit/obligation_ledger.md"
          value = read(path)
          value = value.replace(
              "| `multiply_identity` | θ=0 origin is a two-sided identity |",
              "| `multiply_identity` | normalized factorization identity is two-sided |",
          )
          if "## Public-gonol foundation and bridge obligations — 2026-07-16" not in value:
              value += """

## Public-gonol foundation and bridge obligations — 2026-07-16

| ID | Obligation | Current state |
|---|---|---|
| PG-1 | Fixed SPACE/ZERO twist origin and 720-degree complete return formal surface | Implemented sorry-free in `formal/Ucns/PublicGonol.lean`; `lake build` is authority. |
| PG-2 | Faithful bridge from public vertices/lifted paths into normalized `UCNSObject` values | `hmmm`; no angle formula or first-anchor substitution permitted. |
| PG-3 | Internal multiplication preserves public twist, orientation, faces, and 720-degree return | Open; no system-wide multiplication claim transfers without it. |
| PG-4 | Internal `nMin` is the complete public carrier invariant | Open; Carrier-LCM remains scoped to internal projected `nMin`. |
| PG-5 | Public-gonol scope for Theorem N completeness | Open; current statements are internal and `sorry`-backed. |
| PG-6 | Face XOR derived from exact public twist/chirality canon | Open; Boolean XOR facts remain valid, system interpretation is not inferred. |
"""
          write(path, value)
          PY
