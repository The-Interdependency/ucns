name: repair public-gonol status docs

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/repair-public-gonol-status-docs.yml"
      - "tools/repair_public_identity_docs.py"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out maintenance script
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          path: maintenance

      - name: Check out target recovery branch
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: agent/remove-2pi-inscription-from-canon
          path: target
          fetch-depth: 0

      - name: Check out pinned canonical skill-lib
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/skill-lib
          ref: 05ee7aa9b7d906664d976bf1f06ea44522110489
          path: skill-lib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reconcile public identity and planning docs
        working-directory: target
        run: python ../maintenance/tools/repair_public_identity_docs.py

      - name: Regenerate living manifest and metadata collection
        working-directory: target
        run: |
          python .agents/skills/manifest/generate.py --write
          PYTHONPATH=../skill-lib python ../skill-lib/msdmd/collect.py \
            --root . \
            --repo The-Interdependency/ucns \
            --out ucns_msdmd.ts

      - name: Commit exact target corrections
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md ucns_msdmd.ts README.md CHANGELOG.md ucns-spec.md \
            pcea-ucns/ucns-crypto-domain-v0.md
          git diff --cached --stat
          git commit -m "docs(canon): root package and planning identity in the public frame"
          git push origin HEAD:agent/remove-2pi-inscription-from-canon

      - name: Run focused recovery gates on committed content
        working-directory: target
        continue-on-error: true
        run: |
          python audit/reconcile.py
          python -m pytest \
            tests/test_docs_claim_guardrail.py \
            tests/test_public_gonol_claim_guard.py \
            tests/test_public_gonol_status_recovery.py \
            tests/test_public_identity_recovery.py \
            tests/test_mobius_compatibility_scope.py \
            -q
