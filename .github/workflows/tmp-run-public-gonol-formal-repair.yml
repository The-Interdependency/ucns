name: temporary public-gonol formal repair runner

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/public-gonol-formal-repair.trigger"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target canon branch
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: agent/promote-public-gonol-canon
          path: target
          fetch-depth: 0

      - name: Check out reviewed maintenance script
        uses: actions/checkout@v4
        with:
          repository: The-Interdependency/ucns
          ref: agent/apply-public-gonol-formal-scope-out-of-band
          path: maintenance
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply reviewed replacement script to target
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path(
              "maintenance/.github/workflows/apply-public-gonol-formal-scope-out-of-band.yml"
          ).read_text(encoding="utf-8")
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in workflow[start:end].splitlines()
          )

          strict = '''    count = text.count(old)
    if count != 1:
        raise SystemExit(
            f"{path}: expected one occurrence, found {count}: {old[:120]!r}"
        )
    p.write_text(text.replace(old, new), encoding="utf-8")'''
          tolerant = '''    count = text.count(old)
    if count == 0:
        if new in text:
            print(f"already corrected: {path}: {old[:80]!r}")
            return
        print(f"unmatched correction candidate: {path}: {old[:120]!r}")
        return
    if count > 1:
        raise SystemExit(
            f"{path}: ambiguous replacement, found {count}: {old[:120]!r}"
        )
    p.write_text(text.replace(old, new), encoding="utf-8")'''
          if strict not in script:
              raise SystemExit("maintenance replace_one implementation drifted")
          script = script.replace(strict, tolerant, 1)

          namespace = {"__name__": "__main__"}
          old_cwd = Path.cwd()
          try:
              import os
              os.chdir("target")
              exec(compile(script, "<public-gonol-formal-scope-repair>", "exec"), namespace)
          finally:
              os.chdir(old_cwd)
          PY

      - name: Regenerate target manifest and metadata
        working-directory: target
        run: |
          python .agents/skills/manifest/generate.py --write
          git clone --quiet https://github.com/The-Interdependency/skill-lib.git .tmp-skill-lib
          git -C .tmp-skill-lib checkout --quiet 05ee7aa9b7d906664d976bf1f06ea44522110489
          PYTHONPATH=.tmp-skill-lib python .tmp-skill-lib/msdmd/collect.py \
            --root . \
            --repo The-Interdependency/ucns \
            --out ucns_msdmd.ts
          rm -rf .tmp-skill-lib

      - name: Validate complete target
        working-directory: target
        run: |
          python -m pip install -e .[dev]
          python -m pytest -q
          python audit/reconcile.py
          cd formal
          lake exe cache get
          lake build

      - name: Commit validated repair to target branch
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md ucns_msdmd.ts \
            formal/Ucns/Core.lean formal/Ucns/CarrierLcm.lean formal/Ucns/TheoremN.lean \
            ucns/geometry_bridge.py ucns-theorem-n.md docs/carrier-support-pruning.md \
            docs/unitcircle-import-assessment.md audit/obligation_ledger.md
          git diff --cached --stat
          git commit -m "fix(canon): scope internal lemmas under the public twist origin"
          git push origin HEAD:agent/promote-public-gonol-canon
