<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141233"/>
      <stop offset="1" stop-color="#1d1a4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="78" text-anchor="middle" fill="#7fd8e8" font-size="52" font-weight="bold">UCNS · Carrier-LCM Law</text>
  <text x="600" y="126" text-anchor="middle" fill="#e8c87a" font-size="30">Lean 4 proof skeleton — actual discharge state, 2026-06-10</text>

  <!-- Theorem box -->
  <rect x="250" y="165" width="700" height="105" rx="14" fill="#232055" stroke="#7fd8e8" stroke-width="2.5"/>
  <text x="600" y="212" text-anchor="middle" fill="#ffffff" font-size="32" font-family="'Courier New', monospace">carrier_lcm_law</text>
  <text x="600" y="250" text-anchor="middle" fill="#cfd4ff" font-size="27">n_min(A ⊠ B) = lcm( n_min(A), n_min(B) )</text>

  <!-- connector -->
  <line x1="600" y1="270" x2="600" y2="320" stroke="#8a90c8" stroke-width="2.5"/>

  <!-- Composition layer -->
  <rect x="180" y="320" width="840" height="92" rx="14" fill="#173a2a" stroke="#5fd98a" stroke-width="2.5"/>
  <text x="600" y="358" text-anchor="middle" fill="#9af0b4" font-size="26" font-weight="bold">COMPOSITION MACHINE-CHECKED</text>
  <text x="600" y="392" text-anchor="middle" fill="#d8efe0" font-size="19">Nat.dvd_antisymm(upper, lcm(lower_A, lower_B)) — type-checks, no sorry of its own</text>

  <line x1="320" y1="412" x2="350" y2="460" stroke="#8a90c8" stroke-width="2.5"/>
  <line x1="880" y1="412" x2="850" y2="460" stroke="#8a90c8" stroke-width="2.5"/>

  <!-- Lower bound branch -->
  <rect x="70" y="460" width="500" height="84" rx="12" fill="#173a2a" stroke="#5fd98a" stroke-width="2"/>
  <text x="320" y="495" text-anchor="middle" fill="#9af0b4" font-size="23" font-weight="bold">Lower bounds (x2) — CHECKED*</text>
  <text x="320" y="527" text-anchor="middle" fill="#d8efe0" font-size="18">*modulo the two embedding leaves below</text>

  <!-- Upper bound branch -->
  <rect x="630" y="460" width="500" height="84" rx="12" fill="#4a3a18" stroke="#e8c87a" stroke-width="2"/>
  <text x="880" y="495" text-anchor="middle" fill="#f2dca0" font-size="23" font-weight="bold">Upper bound — OPEN</text>
  <text x="880" y="527" text-anchor="middle" fill="#efe4c8" font-size="18">threading the Rat leaves through bind/map</text>

  <!-- DISCHARGED section -->
  <text x="600" y="615" text-anchor="middle" fill="#5fd98a" font-size="30" font-weight="bold">DISCHARGED — axiom audit: propext only, no sorryAx</text>

  <g>
    <rect x="90" y="645" width="495" height="100" rx="12" fill="#173a2a" stroke="#5fd98a" stroke-width="2"/>
    <text x="337" y="685" text-anchor="middle" fill="#9af0b4" font-size="23" font-weight="bold">lcm fold engine</text>
    <text x="337" y="709" text-anchor="middle" fill="#d8efe0" font-size="17" font-family="'Courier New', monospace">dvd_foldl_lcm · foldl_lcm_dvd</text>
    <text x="337" y="731" text-anchor="middle" fill="#d8efe0" font-size="17" font-family="'Courier New', monospace">dvd_foldl_lcm_acc</text>

    <rect x="615" y="645" width="495" height="100" rx="12" fill="#173a2a" stroke="#5fd98a" stroke-width="2"/>
    <text x="862" y="685" text-anchor="middle" fill="#9af0b4" font-size="23" font-weight="bold">divisibility bridge</text>
    <text x="862" y="715" text-anchor="middle" fill="#d8efe0" font-size="19" font-family="'Courier New', monospace">nMin_dvd_of_denoms_subset</text>
  </g>

  <!-- OPEN LEAVES section -->
  <text x="600" y="815" text-anchor="middle" fill="#e8c87a" font-size="30" font-weight="bold">OPEN LEAVES — sorry-stubbed, confer nothing yet</text>

  <g font-size="21">
    <rect x="90" y="845" width="495" height="92" rx="12" fill="#4a3a18" stroke="#e8c87a" stroke-width="2"/>
    <text x="337" y="882" text-anchor="middle" fill="#f2dca0" font-family="'Courier New', monospace">den_amod_dvd</text>
    <text x="337" y="912" text-anchor="middle" fill="#efe4c8" font-size="19">mod-4 reduction never enlarges a denominator</text>

    <rect x="615" y="845" width="495" height="92" rx="12" fill="#4a3a18" stroke="#e8c87a" stroke-width="2"/>
    <text x="862" y="882" text-anchor="middle" fill="#f2dca0" font-family="'Courier New', monospace">den_add_dvd_lcm</text>
    <text x="862" y="912" text-anchor="middle" fill="#efe4c8" font-size="19">sum's denominator divides lcm of denominators</text>

    <rect x="90" y="957" width="495" height="92" rx="12" fill="#4a3a18" stroke="#e8c87a" stroke-width="2"/>
    <text x="337" y="994" text-anchor="middle" fill="#f2dca0" font-family="'Courier New', monospace">slice_embedding_left / _right</text>
    <text x="337" y="1024" text-anchor="middle" fill="#efe4c8" font-size="19">pure slices embed each factor's angles verbatim</text>

    <rect x="615" y="957" width="495" height="92" rx="12" fill="#4a3a18" stroke="#e8c87a" stroke-width="2"/>
    <text x="862" y="994" text-anchor="middle" fill="#f2dca0" font-family="'Courier New', monospace">carrier_lcm_law_upper</text>
    <text x="862" y="1024" text-anchor="middle" fill="#efe4c8" font-size="19">thread the Rat leaves across the mixed cells</text>
  </g>

  <!-- Why the law holds -->
  <rect x="90" y="1095" width="1020" height="150" rx="14" fill="#232055" stroke="#7fd8e8" stroke-width="2"/>
  <text x="600" y="1136" text-anchor="middle" fill="#7fd8e8" font-size="25" font-weight="bold">Why equality, not just divisibility</text>
  <text x="600" y="1172" text-anchor="middle" fill="#cfd4ff" font-size="21">Normalized objects start at angle 0, so the j = 0 and k = 0 slices of the cross-product</text>
  <text x="600" y="1202" text-anchor="middle" fill="#cfd4ff" font-size="21">reproduce both factors' angle lists untouched. Cancellation can only occur in mixed cells —</text>
  <text x="600" y="1232" text-anchor="middle" fill="#cfd4ff" font-size="21">the product carrier can never drop below the lcm.</text>

  <!-- Status strip -->
  <rect x="0" y="1290" width="1200" height="120" fill="#0e0c26"/>
  <text x="600" y="1336" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Prose: DEFENDED · Tests: 2,000 trials exact · Lean: 4 discharged, 5 leaves open</text>
  <text x="600" y="1372" text-anchor="middle" fill="#8a90c8" font-size="21">sorry-count prints in CI on every run — the number only moves one direction</text>

  <text x="600" y="1455" text-anchor="middle" fill="#5a5f96" font-size="20" font-family="'Courier New', monospace">github.com/The-Interdependency/ucns</text>
</svg>
